<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VN Catalog{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <nav>
            <a href="{{ url_for('index') }}" class="logo">📚 VN Catalog</a>
            <div class="nav-links">
                <a href="{{ url_for('index') }}">Все игры</a>
                <a href="{{ url_for('refresh') }}">🔄 Обновить</a>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>VN Catalog © 2026 | Данные из <a href="https://vndb.org" target="_blank">VNDB</a></p>
    </footer>
</body>
</html>
